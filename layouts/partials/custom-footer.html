<!-- Delt GitHub-token-hjelper (global, brukes av alle redigeringsfunksjoner) -->
<script>
var SAMT_TOKEN_KEY = 'samt-bu-gh-token';

function getStoredToken() {
  try {
    var t = localStorage.getItem(SAMT_TOKEN_KEY);
    if (t) return t;
    // Migrasjons-fallback: les fra Decap-nøkler om de finnes
    var keys = ['netlify-cms-user', 'decap-cms-user'];
    for (var i = 0; i < keys.length; i++) {
      var val = localStorage.getItem(keys[i]);
      if (val) { var parsed = JSON.parse(val); if (parsed && parsed.token) return parsed.token; }
    }
  } catch(e) {}
  return null;
}

function storeToken(token) {
  try {
    localStorage.setItem(SAMT_TOKEN_KEY, token);
    localStorage.removeItem('samt-bu-gh-user'); // rydd bort cache ved ny innlogging
  } catch(e) {}
}

function doGitHubLogin(onSuccess) {
  var workerBase = 'https://samt-bu-cms-auth.erik-hag1.workers.dev';
  var w = 600, h = 700;
  var left = Math.round((screen.width - w) / 2);
  var top  = Math.round((screen.height - h) / 2);
  var popup = window.open(
    workerBase + '/auth?provider=github&site_id=samt-bu-docs',
    'samt-gh-oauth',
    'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top
  );
  if (!popup) {
    alert('Popup ble blokkert av nettleseren. Tillat popup-vinduer for dette nettstedet og prøv igjen.');
    return;
  }
  function handleMessage(e) {
    var data = e.data;
    if (data === 'authorizing:github') {
      // Decap-protokoll: svar til popup slik at den vet vår origin og kan sende token tilbake
      e.source.postMessage('authorizing:github', e.origin);
      return;
    }
    if (typeof data === 'string' && data.indexOf('authorization:github:success:') === 0) {
      window.removeEventListener('message', handleMessage);
      try {
        var payload = JSON.parse(data.slice('authorization:github:success:'.length));
        if (payload.token) {
          storeToken(payload.token);
          if (popup && !popup.closed) popup.close();
          onSuccess(payload.token);
        }
      } catch(err) {
        alert('Innlogging feilet: ' + err.message);
      }
    }
  }
  window.addEventListener('message', handleMessage);
}

// Sjekk om eit bygg pågår akkurat nå – returnerer true/false via callback (best-effort)
function checkBuildInProgress(callback) {
  var token = getStoredToken();
  var h = { 'Accept': 'application/vnd.github+json' };
  if (token) h['Authorization'] = 'token ' + token;
  fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/actions/workflows/hugo.yml/runs?per_page=1', { headers: h })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var run = data.workflow_runs && data.workflow_runs[0];
      if (run && (run.status === 'in_progress' || run.status === 'queued')) {
        var age = (Date.now() - new Date(run.created_at).getTime()) / 1000;
        callback(age < 600);
      } else {
        callback(false);
      }
    })
    .catch(function() { callback(false); });
}

// Hent og cache innlogget GitHub-brukernavn (brukes til last_editor i frontmatter)
function fetchCurrentUser(callback) {
  var cached = localStorage.getItem('samt-bu-gh-user');
  if (cached) { callback(cached); return; }
  var token = getStoredToken();
  if (!token) { callback(null); return; }
  fetch('https://api.github.com/user', {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' }
  })
    .then(function(r) { return r.json(); })
    .then(function(u) {
      var login = u.login || null;
      if (login) { try { localStorage.setItem('samt-bu-gh-user', login); } catch(e) {} }
      callback(login);
    })
    .catch(function() { callback(null); });
}

// Persistent bygg-sporing på tvers av sidenavigering (localStorage)
var SAMTU_PENDING_KEY = 'samtu-build-pending';
function samtuGetPending() {
  try { return JSON.parse(localStorage.getItem(SAMTU_PENDING_KEY)); } catch(e) { return null; }
}
function samtuIncrementPending() {
  var p = samtuGetPending() || { count: 0 };
  try { localStorage.setItem(SAMTU_PENDING_KEY, JSON.stringify({ count: (p.count || 0) + 1, lastSaveAt: Date.now() })); } catch(e) {}
}
function samtuClearPending() {
  try { localStorage.removeItem(SAMTU_PENDING_KEY); } catch(e) {}
}
function samtuShowPendingIndicator(count) {
  var ind = document.getElementById('qe-job-indicator');
  if (!ind) return;
  var isEn = document.documentElement.lang === 'en';
  var label = count === 1
    ? (isEn ? '1 change building\u2026' : '1 endring bygges\u2026')
    : (isEn ? count + ' changes building\u2026' : count + ' endringer bygges\u2026');
  ind.innerHTML = '<i class="fa fa-spinner fa-spin" style="font-size:12px; opacity:.85;"></i><span style="margin-left:7px;">' + label + '</span>';
  ind.style.display = 'flex';
}
function samtuShowDoneIndicator() {
  var ind = document.getElementById('qe-job-indicator');
  if (!ind) return;
  var isEn = document.documentElement.lang === 'en';
  var url = window.location.href.split('?')[0] + '?_=' + Date.now();
  var label = isEn ? 'Changes published \u2013 click to reload' : 'Endringer publisert \u2013 klikk for \u00e5 laste inn';
  ind.innerHTML = '<a href="' + url + '" style="color:#9de; display:flex; align-items:center; gap:7px; text-decoration:none;"><i class="fa fa-check-circle" style="font-size:12px;"></i><span>' + label + '</span></a>';
  ind.style.display = 'flex';
}

// Poll GitHub Actions workflow – brukes for rediger og slett (2s intervall)
function startGhPoll(startTime, onDone, onError, onStatus) {
  var token = getStoredToken();
  var h = { 'Accept': 'application/vnd.github+json' };
  if (token) h['Authorization'] = 'token ' + token;
  return setInterval(function() {
    fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/actions/workflows/hugo.yml/runs?per_page=5', { headers: h })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.workflow_runs) return;
        var run = null;
        for (var i = 0; i < data.workflow_runs.length; i++) {
          if (new Date(data.workflow_runs[i].created_at).getTime() >= startTime - 30000) {
            run = data.workflow_runs[i]; break;
          }
        }
        if (!run) { onStatus('Venter på bygg…'); return; }
        if (run.status === 'queued' || run.status === 'in_progress') {
          onStatus('Bygger…');
        } else if (run.status === 'completed') {
          if (run.conclusion === 'success') onDone();
          else onError(run.conclusion);
        }
      })
      .catch(function() { onStatus('Sjekker…'); });
  }, 2000);
}

// Poll URL direkte – brukes for ny side (same-origin, ingen token)
function startUrlPoll(url, onDone, onError, onStatus) {
  var attempts = 0;
  return setInterval(function() {
    if (++attempts > 90) { onError('timeout'); return; }
    fetch(url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cf=' + Date.now(),
          { method: 'HEAD', cache: 'no-store' })
      .then(function(r) {
        if (r.ok) onDone();
        else onStatus(attempts);
      })
      .catch(function() { onStatus('Venter…'); });
  }, 1000);
}

// TipTap lazy-laster (delt av np-dialog og qe-dialog)
function loadTiptap(callback) {
  if (window._Tiptap) { callback(); return; }
  if (window._tiptapLoading) {
    window.addEventListener('tiptap-ready', function h() { window.removeEventListener('tiptap-ready', h); callback(); });
    return;
  }
  window._tiptapLoading = true;
  Promise.all([
    import('https://esm.sh/@tiptap/core@2'),
    import('https://esm.sh/@tiptap/starter-kit@2'),
    import('https://esm.sh/@tiptap/extension-table@2'),
    import('https://esm.sh/@tiptap/extension-table-row@2'),
    import('https://esm.sh/@tiptap/extension-table-cell@2'),
    import('https://esm.sh/@tiptap/extension-table-header@2'),
    import('https://esm.sh/@tiptap/extension-link@2'),
    import('https://esm.sh/@tiptap/extension-image@2'),
    import('https://esm.sh/tiptap-markdown')
  ]).then(function(mods) {
    window._Tiptap = {
      Editor:      mods[0].Editor,
      StarterKit:  mods[1].default,
      Table:       mods[2].Table,
      TableRow:    mods[3].TableRow,
      TableCell:   mods[4].TableCell,
      TableHeader: mods[5].TableHeader,
      Link:        mods[6].Link,
      Image:       mods[7].Image,
      Markdown:    mods[8].Markdown || (mods[8].default && mods[8].default.Markdown) || mods[8].default
    };
    window.dispatchEvent(new Event('tiptap-ready'));
    callback();
  }).catch(function(err) {
    console.error('TipTap load failed', err);
    alert('Kunne ikke laste editoren. Prøv å oppdatere siden.');
  });
}

// Pre-hent GitHub-brukernavn hvis innlogget (popuperer cache for bruk ved lagring)
if (getStoredToken() && !localStorage.getItem('samt-bu-gh-user')) fetchCurrentUser(function() {});

// Gjenopprett pending-spinner ved sideinnlasting (f.eks. etter navigering)
setTimeout(function() {
  var p = samtuGetPending();
  if (!p || !p.count || !p.lastSaveAt) return;
  if ((Date.now() - p.lastSaveAt) > 600000) { samtuClearPending(); return; } // > 10 min – anta ferdig
  samtuShowPendingIndicator(p.count);
}, 200);
</script>

<!-- Ny side – samme nivå: dialog og GitHub API -->
<script>
(function() {
  var overlay = document.getElementById('np-overlay');
  if (!overlay) return;

  var npEditor = null;
  var npImages = {};   // { 'bilde-123.png': '<base64>' }
  var npImageMap = {}; // { 'data:image/...base64...' : 'bilde-123.png' }

  function initNpEditor(callback) {
    if (npEditor) {
      npEditor.commands.setContent('');
      npImages = {}; npImageMap = {};
      callback(); return;
    }
    loadTiptap(function() {
      var T = window._Tiptap;
      npEditor = new T.Editor({
        element: document.getElementById('np-body-pm'),
        extensions: [
          T.StarterKit,
          T.Table.configure({ resizable: false }),
          T.TableRow,
          T.TableCell,
          T.TableHeader,
          T.Link.configure({ openOnClick: false }),
          T.Image,
          T.Markdown.configure({ html: false, transformPastedText: true })
        ],
        content: ''
      });
      setupNpToolbar(npEditor);
      npEditor.view.dom.addEventListener('paste', function(e) {
        var items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (var i = 0; i < items.length; i++) {
          if (items[i].type.indexOf('image') !== -1) {
            e.preventDefault();
            (function(item) {
              var ext = item.type === 'image/jpeg' ? 'jpg' : 'png';
              var fname = 'bilde-' + Date.now() + '.' + ext;
              var reader = new FileReader();
              reader.onload = function(evt) {
                var dataUrl = evt.target.result;
                npImages[fname] = dataUrl.split(',')[1];
                npImageMap[dataUrl] = fname;
                npEditor.chain().focus().setImage({ src: dataUrl }).run();
              };
              reader.readAsDataURL(item.getAsFile());
            })(items[i]);
            break;
          }
        }
      }, true);
      callback();
    });
  }

  function setupNpToolbar(editor) {
    var toolbar = document.getElementById('np-toolbar');
    if (!toolbar) return;
    toolbar.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-np]');
      if (!btn) return;
      e.preventDefault();
      var cmd = btn.getAttribute('data-np');
      switch(cmd) {
        case 'bold':   editor.chain().focus().toggleBold().run(); break;
        case 'italic': editor.chain().focus().toggleItalic().run(); break;
        case 'h2':     editor.chain().focus().toggleHeading({ level: 2 }).run(); break;
        case 'h3':     editor.chain().focus().toggleHeading({ level: 3 }).run(); break;
        case 'ul':     editor.chain().focus().toggleBulletList().run(); break;
        case 'ol':     editor.chain().focus().toggleOrderedList().run(); break;
        case 'link':
          var url = window.prompt('URL:');
          if (url) editor.chain().focus().setLink({ href: url }).run();
          else if (editor.isActive('link')) editor.chain().focus().unsetLink().run();
          break;
        case 'table':
          editor.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run(); break;
      }
      updateNpToolbarState(editor);
    });
    editor.on('selectionUpdate', function() { updateNpToolbarState(editor); });
    editor.on('transaction',     function() { updateNpToolbarState(editor); });
  }

  function updateNpToolbarState(editor) {
    var tb = document.getElementById('np-toolbar');
    if (!tb) return;
    tb.querySelectorAll('[data-np]').forEach(function(btn) {
      var cmd = btn.getAttribute('data-np');
      var active = false;
      if      (cmd === 'bold')   active = editor.isActive('bold');
      else if (cmd === 'italic') active = editor.isActive('italic');
      else if (cmd === 'h2')     active = editor.isActive('heading', { level: 2 });
      else if (cmd === 'h3')     active = editor.isActive('heading', { level: 3 });
      else if (cmd === 'ul')     active = editor.isActive('bulletList');
      else if (cmd === 'ol')     active = editor.isActive('orderedList');
      else if (cmd === 'link')   active = editor.isActive('link');
      btn.classList.toggle('is-active', active);
    });
  }

  function npEditorToMarkdown() {
    if (!npEditor) return '';
    var md = npEditor.storage.markdown.getMarkdown();
    Object.keys(npImageMap).forEach(function(dataUrl) { md = md.split(dataUrl).join(npImageMap[dataUrl]); });
    return md.trim();
  }

  // Laster opp binærfiler som GitHub-blobs, returnerer tree-items med SHA
  function uploadImageBlobs(token, repo, dirPath, images) {
    var names = Object.keys(images);
    if (!names.length) return Promise.resolve([]);
    var apiBase = 'https://api.github.com/repos/SAMT-X/' + repo;
    var h = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
    return Promise.all(names.map(function(fname) {
      return fetch(apiBase + '/git/blobs', {
        method: 'POST', headers: h,
        body: JSON.stringify({ content: images[fname], encoding: 'base64' })
      })
      .then(function(r) { return r.json(); })
      .then(function(blob) {
        return { path: dirPath + '/' + fname, mode: '100644', type: 'blob', sha: blob.sha };
      });
    }));
  }

  var npRepo = '';
  var npParentPath = '';
  var npLang = 'nb';
  var npCurrentPermalink = '';
  var npNewPageUrl = '';
  var npTitle = '';
  var npActivePollTimer = null;
  var npDialogVisible = false;
  var npMode = 'sibling'; // 'sibling' | 'child'

  var STATUS_EN_MAP = {
    'Ny': 'New',
    'Tidlig utkast': 'Early draft',
    'Pågår': 'In progress',
    'Til QA': 'For QA',
    'Godkjent': 'Approved',
    'Avbrutt': 'Cancelled'
  };

  function generateSlug(text) {
    return text.toLowerCase()
      .replace(/æ/g, 'ae').replace(/ø/g, 'oe').replace(/å/g, 'aa')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .replace(/-+/g, '-') || 'ny-side';
  }

  window.openNewSiblingDialog = function(repo, parentPath, lang, currentWeight, currentPermalink) {
    npMode = 'sibling';
    npRepo = repo;
    npParentPath = parentPath;
    npLang = lang || 'nb';
    npCurrentPermalink = currentPermalink || '';

    if (!getStoredToken()) {
      doGitHubLogin(function() {
        window.openNewSiblingDialog(repo, parentPath, lang, currentWeight, currentPermalink);
      });
      return;
    }

    document.getElementById('np-form').reset();
    document.getElementById('np-status').value = 'Ny';
    if (currentWeight) {
      document.getElementById('np-weight').value = currentWeight + 1;
    }
    hideMsg();
    var submitBtn = document.getElementById('np-submit');
    submitBtn.disabled = false;
    submitBtn.textContent = npLang === 'en' ? 'Create page' : 'Opprett side';

    document.getElementById('np-dialog-title').textContent = npLang === 'en' ? 'New page – same level' : 'Ny side – samme nivå';
    setNpStatus('');
    npDialogVisible = true;
    overlay.style.display = 'flex';
    initNpEditor(function() { document.getElementById('np-title-nb').focus(); });
  };

  window.openNewChildDialog = function(repo, dirPath, lang, currentPermalink) {
    npMode = 'child';
    npRepo = repo;
    npParentPath = dirPath;
    npLang = lang || 'nb';
    npCurrentPermalink = currentPermalink || '';

    if (!getStoredToken()) {
      doGitHubLogin(function() {
        window.openNewChildDialog(repo, dirPath, lang, currentPermalink);
      });
      return;
    }

    document.getElementById('np-form').reset();
    document.getElementById('np-status').value = 'Ny';
    document.getElementById('np-weight').value = 10;
    hideMsg();
    var submitBtn = document.getElementById('np-submit');
    submitBtn.disabled = false;
    submitBtn.textContent = npLang === 'en' ? 'Create sub-chapter' : 'Opprett underkapittel';

    document.getElementById('np-dialog-title').textContent = npLang === 'en' ? 'New sub-chapter' : 'Nytt underkapittel';
    setNpStatus('');
    npDialogVisible = true;
    overlay.style.display = 'flex';
    initNpEditor(function() { document.getElementById('np-title-nb').focus(); });
  };

  function closeDialog() { overlay.style.display = 'none'; npDialogVisible = false; }

  // Fix 3: stopp piltaster og andre taster fra å nå globale handlers
  overlay.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeDialog(); }
    e.stopPropagation();
  });

  document.getElementById('np-cancel').addEventListener('click', closeDialog);

  // Fix 1: skjul feilmelding så snart brukeren begynner å rette
  ['np-title-nb', 'np-linktitle-nb', 'np-weight', 'np-status'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', hideMsg);
  });

  document.getElementById('np-form').addEventListener('submit', function(e) {
    e.preventDefault();

    var submitBtn = document.getElementById('np-submit');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Oppretter…';
    submitBtn.style.background = '#888';
    submitBtn.style.cursor = 'default';

    var token = getStoredToken();
    if (!token) {
      submitBtn.disabled = false;
      submitBtn.textContent = npLang === 'en' ? 'Create page' : 'Opprett side';
      doGitHubLogin(function() {
        document.getElementById('np-form').dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
      });
      return;
    }

    var titleNb     = document.getElementById('np-title-nb').value.trim();
    var linkTitleNb = document.getElementById('np-linktitle-nb').value.trim();
    var weight      = document.getElementById('np-weight').value.trim();
    var statusNb    = document.getElementById('np-status').value;
    var body        = npEditorToMarkdown();

    if (!titleNb) { submitBtn.disabled = false; submitBtn.textContent = npLang === 'en' ? 'Create page' : 'Opprett side'; showMsg('error', 'Tittel er påkrevd.'); return; }

    // Fix 2: auto-generer slug fra korttittel (evt. tittel)
    var slug = generateSlug(linkTitleNb || titleNb);
    hideMsg();
    var startTime = Date.now();

    var nbPath = npParentPath + '/' + slug + '/_index.nb.md';
    var enPath = npParentPath + '/' + slug + '/_index.en.md';
    var statusEn = STATUS_EN_MAP[statusNb] || 'New';
    var newId = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });

    var nbLines = ['---', 'id: ' + newId, 'title: ' + yamlStr(titleNb)];
    if (linkTitleNb) nbLines.push('linkTitle: ' + yamlStr(linkTitleNb));
    if (weight) nbLines.push('weight: ' + parseInt(weight, 10));
    if (statusNb) {
      nbLines.push('status: ' + statusNb);
      nbLines.push('# Gyldige verdier: Ny | Tidlig utkast | Pågår | Til QA | Godkjent | Avbrutt');
    }
    nbLines.push('---');
    if (body) { nbLines.push(''); nbLines.push(body); }
    var nbContent = nbLines.join('\n') + '\n';

    var enTitle = titleNb; // bruker norsk tittel som placeholder
    var enLines = ['---', 'id: ' + newId, 'title: ' + yamlStr(enTitle)];
    if (linkTitleNb) enLines.push('linkTitle: ' + yamlStr(linkTitleNb));
    if (weight) enLines.push('weight: ' + parseInt(weight, 10));
    if (statusNb) {
      enLines.push('status: ' + statusEn);
      enLines.push('# Valid values: New | Early draft | In progress | For QA | Approved | Cancelled');
    }
    enLines.push('---');
    enLines.push('');
    enLines.push('*English translation TBD.*');
    var enContent = enLines.join('\n') + '\n';

    var commitMsg = 'Ny side: ' + titleNb;
    var weightInt = weight ? parseInt(weight, 10) : null;
    var newFiles = [
      { path: nbPath, content: nbContent },
      { path: enPath, content: enContent }
    ];

    // Hent søskenfiler og last opp bilder parallelt – alt i én commit
    var imgDir = npParentPath + '/' + slug;
    Promise.all([
      weightInt ? fetchSiblingWeightUpdates(token, npRepo, npParentPath, weightInt, slug) : Promise.resolve([]),
      uploadImageBlobs(token, npRepo, imgDir, npImages)
    ]).then(function(results) {
      return createFilesInOneCommit(token, npRepo, newFiles.concat(results[0]), commitMsg, results[1]);
    })
      .then(function() {
        npTitle = titleNb;
        if (npMode === 'child') {
          npNewPageUrl = npCurrentPermalink.replace(/\/?$/, '/') + slug + '/';
        } else {
          var parentUrl = npCurrentPermalink.replace(/\/[^\/]+\/?$/, '/');
          npNewPageUrl = parentUrl + slug + '/';
        }
        showNpBuildPanel();
        showNpJobIndicator();
        npPollBuild(startTime);
      })
      .catch(function(err) {
        showMsg('error', 'Feil: ' + err.message);
        submitBtn.disabled = false;
        submitBtn.style.background = '';
        submitBtn.style.cursor = '';
        submitBtn.textContent = npMode === 'child'
          ? (npLang === 'en' ? 'Create sub-chapter' : 'Opprett underkapittel')
          : (npLang === 'en' ? 'Create page' : 'Opprett side');
      });
  });

  // Returnerer liste over filer som trenger vektjustering (committer ikke selv)
  function fetchSiblingWeightUpdates(token, repo, parentPath, minWeight, excludeSlug) {
    var apiBase = 'https://api.github.com/repos/SAMT-X/' + repo;
    var headers = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' };

    return fetch(apiBase + '/contents/' + parentPath, { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(entries) {
        if (!Array.isArray(entries)) return [];
        var dirs = entries.filter(function(e) { return e.type === 'dir' && e.name !== excludeSlug; });
        var fetches = [];
        dirs.forEach(function(dir) {
          ['nb', 'en'].forEach(function(lang) {
            var p = parentPath + '/' + dir.name + '/_index.' + lang + '.md';
            fetches.push(
              fetch(apiBase + '/contents/' + p, { headers: headers })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(data) { return data ? { path: p, data: data } : null; })
                .catch(function() { return null; })
            );
          });
        });
        return Promise.all(fetches);
      })
      .then(function(results) {
        var updates = [];
        (results || []).forEach(function(item) {
          if (!item || !item.data || !item.data.content) return;
          var content = decodeURIComponent(escape(atob(item.data.content.replace(/\n/g, ''))));
          var match = content.match(/^weight:\s*(\d+)/m);
          if (!match) return;
          var w = parseInt(match[1], 10);
          if (w < minWeight) return;
          updates.push({ path: item.path, content: content.replace(/^(weight:\s*)\d+/m, '$1' + (w + 1)) });
        });
        return updates;
      });
  }

  function yamlStr(s) {
    if (/[:#\[\]{}&*!|>'"%@`,]/.test(s) || s !== s.trim()) {
      return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    }
    return s;
  }

  // Oppretter flere filer i én enkelt commit via Git Data API (unngår dobbel Hugo-bygg og race condition)
  // blobItems: pre-uploadede binærfiler med SHA (valgfri, f.eks. bilder)
  function createFilesInOneCommit(token, repo, files, commitMsg, blobItems) {
    var apiBase = 'https://api.github.com/repos/SAMT-X/' + repo;
    var headers = {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };
    var currentSha;
    return fetch(apiBase + '/git/ref/heads/main', { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(ref) {
        currentSha = ref.object.sha;
        return fetch(apiBase + '/git/commits/' + currentSha, { headers: headers });
      })
      .then(function(r) { return r.json(); })
      .then(function(commit) {
        var treeItems = files.map(function(f) {
          return { path: f.path, mode: '100644', type: 'blob', content: f.content };
        }).concat(blobItems || []);
        return fetch(apiBase + '/git/trees', {
          method: 'POST', headers: headers,
          body: JSON.stringify({ base_tree: commit.tree.sha, tree: treeItems })
        });
      })
      .then(function(r) { return r.json(); })
      .then(function(tree) {
        return fetch(apiBase + '/git/commits', {
          method: 'POST', headers: headers,
          body: JSON.stringify({ message: commitMsg, tree: tree.sha, parents: [currentSha] })
        });
      })
      .then(function(r) { return r.json(); })
      .then(function(commit) {
        return fetch(apiBase + '/git/refs/heads/main', {
          method: 'PATCH', headers: headers,
          body: JSON.stringify({ sha: commit.sha })
        });
      })
      .then(function(r) {
        if (!r.ok) return r.json().then(function(j) { throw new Error(j.message || r.statusText); });
        return r.json();
      });
  }

  function createFile(token, repo, path, content, message) {
    var encoded = btoa(unescape(encodeURIComponent(content)));
    return fetch('https://api.github.com/repos/SAMT-X/' + repo + '/contents/' + path, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({ message: message, content: encoded, branch: 'main' })
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(j) {
        throw new Error(j.message || r.statusText);
      });
      return r.json();
    });
  }

  function setNpStatus(text) {
    var el = document.getElementById('np-status-text');
    if (el) el.textContent = text;
  }

  function showNpBuildPanel() {
    setNpStatus(npLang === 'en' ? 'Waiting for build to start…' : 'Bygging av nettstedet starter om litt…');
  }

  function showNpJobIndicator() {
    var el = document.getElementById('np-job-indicator');
    if (el) el.style.display = 'flex';
  }

  function hideNpJobIndicator() {
    var el = document.getElementById('np-job-indicator');
    if (el) el.style.display = 'none';
  }

  function navToNewPage() {
    var url = npNewPageUrl;
    url += (url.indexOf('?') >= 0 ? '&' : '?') + '_=' + Date.now();
    window.location.href = url;
  }

  function npPollBuild(startTime) {
    var lang = npLang;
    npActivePollTimer = startUrlPoll(npNewPageUrl,
      function onDone() {
        clearInterval(npActivePollTimer); npActivePollTimer = null;
        if (npDialogVisible) {
          hideNpJobIndicator();
          var secs = 3;
          setNpStatus((lang === 'en' ? '✓ Done! Navigating to new page in ' : '✓ Ferdig! Navigerer til ny side om ') + secs + (lang === 'en' ? 's…' : ' sek…'));
          var cdTimer = setInterval(function() {
            secs--;
            if (secs <= 0) { clearInterval(cdTimer); navToNewPage(); return; }
            setNpStatus((lang === 'en' ? '✓ Done! Navigating to new page in ' : '✓ Ferdig! Navigerer til ny side om ') + secs + (lang === 'en' ? 's…' : ' sek…'));
          }, 1000);
        } else {
          var indicator = document.getElementById('np-job-indicator');
          if (indicator) {
            indicator.innerHTML = '<a href="' + npNewPageUrl + '" style="color:#9de; display:flex; align-items:center; gap:7px; text-decoration:none;"><i class="fa fa-check-circle" style="font-size:12px;"></i><span>' + (lang === 'en' ? 'New page ready – click to open' : 'Ny side klar – klikk for å åpne') + '</span></a>';
          }
        }
      },
      function onError(reason) {
        clearInterval(npActivePollTimer); npActivePollTimer = null;
        hideNpJobIndicator();
        setNpStatus((lang === 'en' ? '⚠ Timed out: ' : '⚠ Tidsavbrudd: ') + reason);
      },
      function onStatus(secs) { setNpStatus(lang === 'en' ? 'Updating site (' + secs + 's)…' : 'Nettsted oppdateres (' + secs + ' sek)…'); }
    );
  }

  function showMsg(type, text) {
    var el = document.getElementById('np-msg');
    el.style.display = 'block';
    el.style.background = type === 'error' ? '#fff0f0' : '#f0fff4';
    el.style.border    = '1px solid ' + (type === 'error' ? '#f5c6c6' : '#b2dfdb');
    el.style.color     = type === 'error' ? '#900' : '#1b5e20';
    el.textContent = text;
  }

  function hideMsg() {
    document.getElementById('np-msg').style.display = 'none';
  }
})();
</script>

<!-- Slett denne siden: dialog og GitHub API -->
<script>
(function() {
  var overlay = document.getElementById('del-overlay');
  if (!overlay) return;

  var delRepo = '', delDirPath = '', delLang = 'nb', delTitle = '', delParentUrl = '';
  var activePollTimer = null;

  window.openDeleteDialog = function(repo, dirPath, lang, title, parentUrl) {
    delRepo = repo;
    delDirPath = dirPath;
    delLang = lang || 'nb';
    delTitle = (typeof title === 'string') ? title.replace(/^"(.*)"$/, '$1') : title;
    delParentUrl = parentUrl;

    if (!getStoredToken()) {
      doGitHubLogin(function() {
        window.openDeleteDialog(repo, dirPath, lang, title, parentUrl);
      });
      return;
    }

    document.getElementById('del-heading').textContent =
      lang === 'en' ? 'Delete this page' : 'Slett denne siden';
    document.getElementById('del-confirm-text').textContent =
      lang === 'en' ? 'Delete "' + title + '"?' : 'Vil du slette «' + title + '»?';
    document.getElementById('del-cancel').textContent = lang === 'en' ? 'Cancel' : 'Avbryt';
    document.getElementById('del-confirm-btn').textContent = lang === 'en' ? 'Delete page' : 'Slett siden';
    document.getElementById('del-confirm-btn').disabled = false;
    document.getElementById('del-cancel').disabled = false;
    document.getElementById('del-error').style.display = 'none';
    overlay.style.display = 'block';
  };

  function closeDialog() {
    overlay.style.display = 'none';
    document.getElementById('del-confirm-section').style.display = 'block';
    document.getElementById('del-build-section').style.display = 'none';
    // activePollTimer stoppes IKKE her – polling fortsetter i bakgrunnen
    // slik at navigering skjer automatisk når bygget er ferdig
  }

  overlay.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDialog(); e.stopPropagation(); });
  document.getElementById('del-close-x').addEventListener('click', closeDialog);
  document.getElementById('del-cancel').addEventListener('click', closeDialog);
  document.getElementById('del-panel-close').addEventListener('click', closeDialog);

  document.getElementById('del-confirm-btn').addEventListener('click', function() {
    var token = getStoredToken();
    if (!token) { closeDialog(); return; }

    var confirmBtn = document.getElementById('del-confirm-btn');
    var cancelBtn  = document.getElementById('del-cancel');
    confirmBtn.disabled = true;
    confirmBtn.textContent = delLang === 'en' ? 'Deleting…' : 'Sletter…';
    cancelBtn.disabled = true;

    var startTime = Date.now();
    var nbPath = delDirPath + '/_index.nb.md';
    var enPath = delDirPath + '/_index.en.md';

    deleteFilesInOneCommit(token, delRepo, [nbPath, enPath], 'Slett side: ' + delTitle)
      .then(function() {
        showBuildPanel();
        showJobIndicator();
        pollBuild(startTime);
      })
      .catch(function(err) {
        var errEl = document.getElementById('del-error');
        errEl.style.display = 'block';
        errEl.textContent = 'Feil: ' + err.message;
        confirmBtn.disabled = false;
        confirmBtn.textContent = delLang === 'en' ? 'Delete page' : 'Slett siden';
        cancelBtn.disabled = false;
      });
  });

  function deleteFilesInOneCommit(token, repo, paths, commitMsg) {
    var apiBase = 'https://api.github.com/repos/SAMT-X/' + repo;
    var h = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
    var headSha;
    return fetch(apiBase + '/git/ref/heads/main', { headers: h })
      .then(function(r) { return r.json(); })
      .then(function(ref) {
        headSha = ref.object.sha;
        return fetch(apiBase + '/git/commits/' + headSha, { headers: h });
      })
      .then(function(r) { return r.json(); })
      .then(function(commit) {
        var items = paths.map(function(p) { return { path: p, mode: '100644', type: 'blob', sha: null }; });
        return fetch(apiBase + '/git/trees', { method: 'POST', headers: h, body: JSON.stringify({ base_tree: commit.tree.sha, tree: items }) });
      })
      .then(function(r) { return r.json(); })
      .then(function(tree) {
        return fetch(apiBase + '/git/commits', { method: 'POST', headers: h, body: JSON.stringify({ message: commitMsg, tree: tree.sha, parents: [headSha] }) });
      })
      .then(function(r) { return r.json(); })
      .then(function(newCommit) {
        return fetch(apiBase + '/git/refs/heads/main', { method: 'PATCH', headers: h, body: JSON.stringify({ sha: newCommit.sha }) });
      })
      .then(function(r) {
        if (!r.ok) return r.json().then(function(j) { throw new Error(j.message || r.statusText); });
        return r.json();
      });
  }

  function showBuildPanel() {
    document.getElementById('del-confirm-section').style.display = 'none';
    document.getElementById('del-build-section').style.display = 'block';
    document.getElementById('del-heading').textContent =
      delLang === 'en' ? 'Deleting "' + delTitle + '"…' : 'Sletter «' + delTitle + '»…';
    document.getElementById('del-build-status-text').textContent =
      delLang === 'en' ? 'Updating site (0s)…' : 'Nettsted oppdateres (0 sek)…';
    document.getElementById('del-panel-done').style.display = 'none';
  }

  function showJobIndicator() {
    var el = document.getElementById('del-job-indicator');
    if (el) el.style.display = 'flex';
  }

  function hideJobIndicator() {
    var el = document.getElementById('del-job-indicator');
    if (el) el.style.display = 'none';
  }

  function navAfterDelete() {
    var url = delParentUrl;
    url += (url.indexOf('?') >= 0 ? '&' : '?') + '_=' + Date.now();
    window.location.href = url;
  }

  function pollBuild(startTime) {
    var lang = delLang;
    var pageUrl = window.location.href.split('?')[0];
    var attempts = 0;

    document.getElementById('del-panel-done').onclick = function() {
      clearInterval(activePollTimer); activePollTimer = null;
      hideJobIndicator();
      navAfterDelete();
    };

    function onDone() {
      clearInterval(activePollTimer); activePollTimer = null;
      hideJobIndicator();
      var doneBtn = document.getElementById('del-panel-done');
      if (doneBtn) doneBtn.style.display = 'inline-block';
      var secs = 3;
      var statusEl = document.getElementById('del-build-status-text');
      if (statusEl) statusEl.textContent = (lang === 'en' ? '✓ Done! Navigating in ' : '✓ Ferdig! Navigerer om ') + secs + (lang === 'en' ? 's…' : ' sek…');
      var cdTimer = setInterval(function() {
        secs--;
        if (secs <= 0) { clearInterval(cdTimer); navAfterDelete(); return; }
        var el = document.getElementById('del-build-status-text');
        if (el) el.textContent = (lang === 'en' ? '✓ Done! Navigating in ' : '✓ Ferdig! Navigerer om ') + secs + (lang === 'en' ? 's…' : ' sek…');
      }, 1000);
    }

    // Poll nåværende side-URL – vent på 404 (siden forsvinner fra CF CDN)
    activePollTimer = setInterval(function() {
      if (++attempts > 120) {
        clearInterval(activePollTimer); activePollTimer = null;
        var statusEl = document.getElementById('del-build-status-text');
        if (statusEl) statusEl.textContent = '⚠ ' + (lang === 'en' ? 'Timed out' : 'Tidsavbrudd');
        var doneBtn = document.getElementById('del-panel-done');
        if (doneBtn) doneBtn.style.display = 'inline-block';
        return;
      }
      fetch(pageUrl + '?_cf=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (r.status === 404) {
            onDone();
          } else {
            var statusEl = document.getElementById('del-build-status-text');
            if (statusEl) statusEl.textContent = lang === 'en' ? 'Updating site (' + attempts + 's)…' : 'Nettsted oppdateres (' + attempts + ' sek)…';
          }
        })
        .catch(function() {});
    }, 1000);
  }
})();

</script>

<!-- Rediger innhold: TipTap WYSIWYG – hent eksisterende side, rediger, lagre til GitHub -->
<script>
(function() {
  var overlay = document.getElementById('qe-overlay');
  if (!overlay) return;

  var qeRepo = '', qeFilePath = '', qeLang = 'nb', qePageTitle = '', qePermalink = '';
  var qeFrontmatter = '', qeEditor = null, qePollTimer = null;
  var qeImages = {}, qeImageMap = {};

  function parseFrontmatter(content) {
    var m = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if (m) return { frontmatter: '---\n' + m[1] + '\n---\n', body: m[2].trim() };
    return { frontmatter: '', body: content.trim() };
  }

  function qeYamlStr(s) {
    if (/[:#\[\]{}&*!|>'"%@`,]/.test(s) || s !== s.trim()) {
      return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    }
    return s;
  }

  function parseFmField(fm, key) {
    var m = fm.match(new RegExp('^' + key + ':\\s*(.*)$', 'm'));
    if (!m) return '';
    var v = m[1].trim();
    if (v.length >= 2 && ((v[0] === '"' && v[v.length-1] === '"') || (v[0] === "'" && v[v.length-1] === "'"))) {
      v = v.slice(1, -1).replace(/\\"/g, '"');
    }
    return v;
  }

  function setFmField(fm, key, line) {
    if (new RegExp('^' + key + ':', 'm').test(fm)) {
      return fm.replace(new RegExp('^' + key + ':.*$', 'm'), line);
    }
    return fm.replace(/\n---\n$/, '\n' + line + '\n---\n');
  }

  function removeFmField(fm, key) {
    return fm.replace(new RegExp('^' + key + ':.*\\n', 'm'), '');
  }

  function setStatus(text) {
    var el = document.getElementById('qe-status-text');
    if (el) el.textContent = text;
  }

  function setupQeToolbar(editor) {
    var toolbar = document.getElementById('qe-toolbar');
    if (!toolbar) return;
    toolbar.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-qe]');
      if (!btn) return;
      e.preventDefault();
      var cmd = btn.getAttribute('data-qe');
      switch(cmd) {
        case 'bold':         editor.chain().focus().toggleBold().run(); break;
        case 'italic':       editor.chain().focus().toggleItalic().run(); break;
        case 'h2':           editor.chain().focus().toggleHeading({ level: 2 }).run(); break;
        case 'h3':           editor.chain().focus().toggleHeading({ level: 3 }).run(); break;
        case 'ul':           editor.chain().focus().toggleBulletList().run(); break;
        case 'ol':           editor.chain().focus().toggleOrderedList().run(); break;
        case 'link':
          var url = window.prompt('URL:');
          if (url) editor.chain().focus().setLink({ href: url }).run();
          else if (editor.isActive('link')) editor.chain().focus().unsetLink().run();
          break;
        case 'table':        editor.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run(); break;
        case 'addRowBefore': editor.chain().focus().addRowBefore().run(); break;
        case 'addRowAfter':  editor.chain().focus().addRowAfter().run(); break;
        case 'deleteRow':    editor.chain().focus().deleteRow().run(); break;
        case 'addColBefore': editor.chain().focus().addColumnBefore().run(); break;
        case 'addColAfter':  editor.chain().focus().addColumnAfter().run(); break;
        case 'deleteCol':    editor.chain().focus().deleteColumn().run(); break;
        case 'clear':        editor.chain().focus().clearNodes().unsetAllMarks().run(); break;
      }
    });
    editor.on('selectionUpdate', function() { updateQeToolbarState(editor); });
    editor.on('transaction',     function() { updateQeToolbarState(editor); });
  }

  function updateQeToolbarState(editor) {
    var tb = document.getElementById('qe-toolbar');
    if (!tb) return;
    tb.querySelectorAll('[data-qe]').forEach(function(btn) {
      var cmd = btn.getAttribute('data-qe');
      var active = false;
      if      (cmd === 'bold')   active = editor.isActive('bold');
      else if (cmd === 'italic') active = editor.isActive('italic');
      else if (cmd === 'h2')     active = editor.isActive('heading', { level: 2 });
      else if (cmd === 'h3')     active = editor.isActive('heading', { level: 3 });
      else if (cmd === 'ul')     active = editor.isActive('bulletList');
      else if (cmd === 'ol')     active = editor.isActive('orderedList');
      else if (cmd === 'link')   active = editor.isActive('link');
      btn.classList.toggle('is-active', active);
    });
  }

  window.openEditDialog = function(repo, filePath, lang, pageTitle, permalink) {
    qeRepo = repo; qeFilePath = filePath; qeLang = lang || 'nb';
    qePageTitle = pageTitle; qePermalink = permalink || '';
    qeImages = {}; qeImageMap = {};

    if (!getStoredToken()) {
      doGitHubLogin(function() {
        window.openEditDialog(repo, filePath, lang, pageTitle, permalink);
      });
      return;
    }
    var token = getStoredToken();

    var cleanTitle = (typeof pageTitle === 'string') ? pageTitle.replace(/^"(.*)"$/, '$1') : pageTitle;
    document.getElementById('qe-title').textContent = (lang === 'en' ? 'Edit page: ' : 'Rediger side: ') + cleanTitle;
    var saveBtn = document.getElementById('qe-save-btn');
    saveBtn.disabled = true;
    saveBtn.onclick = null;
    saveBtn.textContent = lang === 'en' ? 'Save' : 'Lagre';
    saveBtn.style.background = '';
    saveBtn.style.cursor = '';
    var cancelBtn = document.getElementById('qe-cancel-btn');
    if (cancelBtn) cancelBtn.textContent = lang === 'en' ? 'Cancel' : 'Avbryt';
    setStatus(lang === 'en' ? 'Loading…' : 'Laster…');
    overlay.style.display = 'flex';

    // Sjekk om bygg pågår – vis advarsel (blokkerer ikke)
    checkBuildInProgress(function(active) {
      var w = document.getElementById('qe-build-warning');
      if (w) w.style.display = active ? 'block' : 'none';
    });
    // Varm opp brukernavn-cache for bruk ved lagring
    fetchCurrentUser(function() {});

    loadTiptap(function() {
      var T = window._Tiptap;
      if (!qeEditor) {
        qeEditor = new T.Editor({
          element: document.getElementById('qe-body-pm'),
          extensions: [
            T.StarterKit,
            T.Table.configure({ resizable: false }),
            T.TableRow,
            T.TableCell,
            T.TableHeader,
            T.Link.configure({ openOnClick: false }),
            T.Image,
            T.Markdown.configure({ html: false, transformPastedText: true })
          ],
          content: ''
        });
        setupQeToolbar(qeEditor);
        qeEditor.view.dom.addEventListener('paste', function(e) {
          var items = e.clipboardData && e.clipboardData.items;
          if (!items) return;
          for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
              e.preventDefault();
              (function(item) {
                var ext = item.type === 'image/jpeg' ? 'jpg' : 'png';
                var fname = 'bilde-' + Date.now() + '.' + ext;
                var reader = new FileReader();
                reader.onload = function(evt) {
                  var dataUrl = evt.target.result;
                  qeImages[fname] = dataUrl.split(',')[1];
                  qeImageMap[dataUrl] = fname;
                  qeEditor.chain().focus().setImage({ src: dataUrl }).run();
                };
                reader.readAsDataURL(item.getAsFile());
              })(items[i]);
              break;
            }
          }
        }, true);
      } else {
        qeEditor.commands.setContent('');
        qeImages = {}; qeImageMap = {};
      }

      var h = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' };
      fetch('https://api.github.com/repos/SAMT-X/' + qeRepo + '/contents/' + qeFilePath, { headers: h })
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(data) {
          var raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
          var parsed = parseFrontmatter(raw);
          qeFrontmatter = parsed.frontmatter;
          qeEditor.commands.setContent(parsed.body || '');

          // Fyll inn metadata-felter
          document.getElementById('qe-field-title').value    = parseFmField(qeFrontmatter, 'title');
          document.getElementById('qe-field-linktitle').value = parseFmField(qeFrontmatter, 'linkTitle');
          document.getElementById('qe-field-weight').value   = parseFmField(qeFrontmatter, 'weight');
          var currentStatus = parseFmField(qeFrontmatter, 'status');
          var statusOpts = qeLang === 'en'
            ? ['', 'New', 'Early draft', 'In progress', 'For QA', 'Approved', 'Cancelled']
            : ['', 'Ny', 'Tidlig utkast', 'Pågår', 'Til QA', 'Godkjent', 'Avbrutt'];
          var sel = document.getElementById('qe-field-status');
          sel.innerHTML = '';
          statusOpts.forEach(function(opt) {
            var o = document.createElement('option');
            o.value = opt; o.textContent = opt || (qeLang === 'en' ? '(none)' : '(ingen)');
            if (opt === currentStatus) o.selected = true;
            sel.appendChild(o);
          });

          document.getElementById('qe-field-hidetoc').checked = parseFmField(qeFrontmatter, 'hide_toc') === 'true';

          setStatus('');
          saveBtn.disabled = false;
          qeEditor.commands.focus();
        })
        .catch(function(err) { setStatus('Feil ved innlasting: ' + err.message); });
    });
  };

  function closeQeDialog() {
    overlay.style.display = 'none';
    if (qePollTimer) {
      // Bygg pågår: vis spinner i bunnen i stedet for å avbryte polling
      var ind = document.getElementById('qe-job-indicator');
      if (ind) ind.style.display = 'flex';
    }
  }

  document.getElementById('qe-cancel-btn').addEventListener('click', closeQeDialog);
  overlay.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeQeDialog(); e.stopPropagation(); });

  document.getElementById('qe-save-btn').addEventListener('click', function() {
    var token = getStoredToken();
    if (!token || !qeEditor) return;
    var saveBtn = document.getElementById('qe-save-btn');
    if (saveBtn.onclick) return; // er i "lukk"-modus – la onclick håndtere det
    saveBtn.disabled = true;
    saveBtn.textContent = qeLang === 'en' ? 'Saving…' : 'Lagrer…';
    setStatus('');

    var md = qeEditor.storage.markdown.getMarkdown();
    Object.keys(qeImageMap).forEach(function(dataUrl) { md = md.split(dataUrl).join(qeImageMap[dataUrl]); });
    var body = md.trim();

    // Bygg frontmatter fra skjemafeltene
    var fm = qeFrontmatter;
    var newTitle     = document.getElementById('qe-field-title').value.trim();
    var newLinkTitle = document.getElementById('qe-field-linktitle').value.trim();
    var newWeight    = document.getElementById('qe-field-weight').value.trim();
    var newStatus    = document.getElementById('qe-field-status').value;
    if (newTitle)     fm = setFmField(fm, 'title',     'title: '     + qeYamlStr(newTitle));
    if (newLinkTitle) fm = setFmField(fm, 'linkTitle', 'linkTitle: ' + qeYamlStr(newLinkTitle));
    else              fm = removeFmField(fm, 'linkTitle');
    if (newWeight)    fm = setFmField(fm, 'weight', 'weight: ' + parseInt(newWeight, 10));
    else              fm = removeFmField(fm, 'weight');
    if (newStatus)    fm = setFmField(fm, 'status', 'status: ' + newStatus);
    else              fm = removeFmField(fm, 'status');
    if (document.getElementById('qe-field-hidetoc').checked) fm = setFmField(fm, 'hide_toc', 'hide_toc: true');
    else              fm = removeFmField(fm, 'hide_toc');
    var editorLogin = localStorage.getItem('samt-bu-gh-user');
    if (editorLogin) fm = setFmField(fm, 'last_editor', 'last_editor: ' + editorLogin);

    var newContent = fm + body + '\n';
    var imgDir     = qeFilePath.replace('/_index.' + qeLang + '.md', '');
    var startTime  = Date.now();
    var commitMsg  = (qeLang === 'en' ? 'Updated: ' : 'Oppdatert: ') + qePageTitle;

    // Hent ETag for nåværende side async (best-effort) – brukes til å detektere deploy
    var qeOldEtag = null;
    fetch(qePermalink, { method: 'HEAD', cache: 'no-store' })
      .then(function(r) { qeOldEtag = r.headers.get('etag') || r.headers.get('last-modified') || null; })
      .catch(function() {});

    function tryCommit(blobItems, attemptsLeft) {
      return createQeCommit(token, qeRepo, qeFilePath, newContent, blobItems, commitMsg)
        .catch(function(err) {
          if (err.message === 'Update is not a fast forward' && attemptsLeft > 0) {
            setStatus(qeLang === 'en' ? 'Retrying…' : 'Prøver på nytt…');
            return new Promise(function(res) { setTimeout(res, 1500); })
              .then(function() { return tryCommit(blobItems, attemptsLeft - 1); });
          }
          throw err;
        });
    }

    uploadQeBlobs(token, qeRepo, imgDir, qeImages)
      .then(function(blobItems) { return tryCommit(blobItems, 2); })
      .then(function() {
        setStatus(qeLang === 'en' ? 'Saved! Updating site…' : 'Lagret! Nettstedet oppdateres…');
        saveBtn.disabled = true;
        saveBtn.textContent = qeLang === 'en' ? 'Saved' : 'Lagret';
        saveBtn.style.background = '#888';
        saveBtn.style.cursor = 'default';
        var cancelBtn = document.getElementById('qe-cancel-btn');
        if (cancelBtn) cancelBtn.textContent = qeLang === 'en' ? 'Close this window' : 'Lukk dette vinduet';
        var w = document.getElementById('qe-build-warning');
        if (w) w.style.display = 'none';
        samtuIncrementPending();
        pollQeBuild(startTime, qeOldEtag);
      })
      .catch(function(err) {
        var msg = err.message;
        if (msg === 'Update is not a fast forward') {
          msg = qeLang === 'en' ? 'Conflict: file changed elsewhere. Try again.' : 'Konflikt: siden ble endret av andre. Prøv igjen.';
        }
        setStatus('⚠ ' + msg);
        saveBtn.disabled = false;
        saveBtn.style.background = '';
        saveBtn.style.cursor = '';
        saveBtn.textContent = qeLang === 'en' ? 'Retry' : 'Prøv igjen';
      });
  });

  function pollQeBuild(startTime, oldEtag) {
    if (qePollTimer) { clearInterval(qePollTimer); qePollTimer = null; }
    var lang = qeLang;
    var url = qePermalink;
    var attempts = 0;

    function doNav() { window.location.href = url + '?_=' + Date.now(); }

    function onBuildDone() {
      clearInterval(qePollTimer); qePollTimer = null;
      samtuClearPending();
      if (overlay.style.display !== 'none') {
        // Dialog er åpen: tell ned og last inn automatisk
        var secs = 2;
        setStatus(lang === 'en' ? '✓ Done! Reloading in ' + secs + 's…' : '✓ Ferdig! Laster inn om ' + secs + ' sek…');
        var btn = document.getElementById('qe-save-btn');
        if (btn) {
          btn.disabled = false;
          btn.style.background = '';
          btn.style.cursor = '';
          btn.textContent = lang === 'en' ? 'Reload now ↗' : 'Last inn nå ↗';
          btn.onclick = function() { clearTimeout(navTimer); doNav(); };
        }
        var navTimer = setTimeout(doNav, secs * 1000);
      } else {
        // Dialog er lukket: erstatt spinner med klikkbar lenke
        samtuShowDoneIndicator();
      }
    }

    if (oldEtag) {
      // ETag-deteksjon: vent til Cloudflare serverer ny versjon (same-origin HEAD-poll)
      qePollTimer = setInterval(function() {
        if (++attempts > 90) { clearInterval(qePollTimer); qePollTimer = null; setStatus('⚠ Tidsavbrudd'); return; }
        fetch(url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cf=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
          .then(function(r) {
            var newEtag = r.headers.get('etag') || r.headers.get('last-modified');
            if (r.ok && newEtag && newEtag !== oldEtag) onBuildDone();
            else setStatus(lang === 'en' ? 'Updating site (' + attempts + 's)…' : 'Nettsted oppdateres (' + attempts + ' sek)…');
          })
          .catch(function() { setStatus('Venter…'); });
      }, 1000);
    } else {
      // Fallback: GitHub Actions API (2s intervall)
      qePollTimer = startGhPoll(startTime,
        onBuildDone,
        function onError(reason) { clearInterval(qePollTimer); qePollTimer = null; setStatus('⚠ ' + reason); },
        function onStatus(msg) { setStatus(msg); }
      );
    }
  }

  function uploadQeBlobs(token, repo, dirPath, images) {
    var names = Object.keys(images);
    if (!names.length) return Promise.resolve([]);
    var apiBase = 'https://api.github.com/repos/SAMT-X/' + repo;
    var h = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
    return Promise.all(names.map(function(fname) {
      return fetch(apiBase + '/git/blobs', { method: 'POST', headers: h, body: JSON.stringify({ content: images[fname], encoding: 'base64' }) })
        .then(function(r) { return r.json(); })
        .then(function(blob) { return { path: dirPath + '/' + fname, mode: '100644', type: 'blob', sha: blob.sha }; });
    }));
  }

  function createQeCommit(token, repo, filePath, content, blobItems, message) {
    var apiBase = 'https://api.github.com/repos/SAMT-X/' + repo;
    var h = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
    var headSha;
    return fetch(apiBase + '/git/ref/heads/main', { headers: h })
      .then(function(r) { return r.json(); })
      .then(function(ref) { headSha = ref.object.sha; return fetch(apiBase + '/git/commits/' + headSha, { headers: h }); })
      .then(function(r) { return r.json(); })
      .then(function(commit) {
        var items = [{ path: filePath, mode: '100644', type: 'blob', content: content }].concat(blobItems || []);
        return fetch(apiBase + '/git/trees', { method: 'POST', headers: h, body: JSON.stringify({ base_tree: commit.tree.sha, tree: items }) });
      })
      .then(function(r) { return r.json(); })
      .then(function(tree) { return fetch(apiBase + '/git/commits', { method: 'POST', headers: h, body: JSON.stringify({ message: message, tree: tree.sha, parents: [headSha] }) }); })
      .then(function(r) { return r.json(); })
      .then(function(commit) { return fetch(apiBase + '/git/refs/heads/main', { method: 'PATCH', headers: h, body: JSON.stringify({ sha: commit.sha }) }); })
      .then(function(r) {
        if (!r.ok) return r.json().then(function(j) { throw new Error(j.message || r.statusText); });
        return r.json();
      });
  }
})();
</script>

<!-- Bakgrunnspolling: detekter endringer på gjeldende side (andre brukere eller annet bygg) -->
<script>
(function() {
  var pageUrl = window.location.href.split('?')[0];
  var knownEtag = null;
  var bgTimer = null;

  // Hent initial ETag etter at siden er ferdig lastet
  setTimeout(function() {
    fetch(pageUrl, { method: 'HEAD', cache: 'no-store' })
      .then(function(r) { knownEtag = r.headers.get('etag') || r.headers.get('last-modified'); })
      .catch(function() {});
  }, 4000);

  bgTimer = setInterval(function() {
    if (!knownEtag) return;
    // Ikke poll under aktiv rediger/slett-jobb (sjekk synlige indikatorer)
    var qeInd = document.getElementById('qe-job-indicator');
    var npInd = document.getElementById('np-job-indicator');
    var delInd = document.getElementById('del-job-indicator');
    if ((qeInd && qeInd.style.display !== 'none') ||
        (npInd && npInd.style.display !== 'none') ||
        (delInd && delInd.style.display !== 'none')) return;

    fetch(pageUrl + '?_bg=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
      .then(function(r) {
        var newEtag = r.headers.get('etag') || r.headers.get('last-modified');
        if (newEtag && newEtag !== knownEtag) {
          var p = samtuGetPending();
          var tooSoon = p && p.count && p.lastSaveAt && (Date.now() - p.lastSaveAt) < 60000;
          if (tooSoon) return; // for tidlig – bygg inkluderer kanskje ikke siste endring ennå
          knownEtag = newEtag;
          clearInterval(bgTimer);
          if (p && p.count) {
            // Egne ventende endringer – vis «ferdig»-indikator
            samtuClearPending();
            samtuShowDoneIndicator();
          } else {
            // Andres endring – vis generelt oppdateringsbanner
            var banner = document.getElementById('page-update-banner');
            if (banner) banner.style.display = 'flex';
          }
        }
      })
      .catch(function() {});
  }, 45000);

  // Klikk på banneret laster inn siden på nytt
  setTimeout(function() {
    var banner = document.getElementById('page-update-banner');
    if (banner) banner.addEventListener('click', function() { window.location.reload(); });
  }, 1000);
})();
</script>
