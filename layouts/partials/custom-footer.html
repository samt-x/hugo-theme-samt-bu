<!-- Delt GitHub-token-hjelper (global, brukes av alle redigeringsfunksjoner) -->
<script>
var SAMT_TOKEN_KEY = 'samt-bu-gh-token';

function getStoredToken() {
  try {
    var t = localStorage.getItem(SAMT_TOKEN_KEY);
    if (t) return t;
    // Migrasjons-fallback: les fra Decap-nøkler om de finnes
    var keys = ['netlify-cms-user', 'decap-cms-user'];
    for (var i = 0; i < keys.length; i++) {
      var val = localStorage.getItem(keys[i]);
      if (val) { var parsed = JSON.parse(val); if (parsed && parsed.token) return parsed.token; }
    }
  } catch(e) {}
  return null;
}

function storeToken(token) {
  try {
    localStorage.setItem(SAMT_TOKEN_KEY, token);
    localStorage.removeItem('samt-bu-gh-user'); // rydd bort cache ved ny innlogging
  } catch(e) {}
}

function doGitHubLogin(onSuccess) {
  var workerBase = 'https://samt-bu-cms-auth.erik-hag1.workers.dev';
  var w = 600, h = 700;
  var left = Math.round((screen.width - w) / 2);
  var top  = Math.round((screen.height - h) / 2);
  var popup = window.open(
    workerBase + '/auth?provider=github&site_id=samt-bu-docs',
    'samt-gh-oauth',
    'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top
  );
  if (!popup) {
    alert('Popup ble blokkert av nettleseren. Tillat popup-vinduer for dette nettstedet og prøv igjen.');
    return;
  }
  function handleMessage(e) {
    var data = e.data;
    if (data === 'authorizing:github') {
      // Decap-protokoll: svar til popup slik at den vet vår origin og kan sende token tilbake
      e.source.postMessage('authorizing:github', e.origin);
      return;
    }
    if (typeof data === 'string' && data.indexOf('authorization:github:success:') === 0) {
      window.removeEventListener('message', handleMessage);
      try {
        var payload = JSON.parse(data.slice('authorization:github:success:'.length));
        if (payload.token) {
          storeToken(payload.token);
          if (popup && !popup.closed) popup.close();
          onSuccess(payload.token);
        }
      } catch(err) {
        alert('Innlogging feilet: ' + err.message);
      }
    }
  }
  window.addEventListener('message', handleMessage);
}

// Sjekk om eit bygg pågår akkurat nå – returnerer true/false via callback (best-effort)
function checkBuildInProgress(filePath, callback) {
  var token = getStoredToken();
  var h = { 'Accept': 'application/vnd.github+json' };
  if (token) h['Authorization'] = 'token ' + token;
  fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/actions/workflows/hugo.yml/runs?per_page=1', { headers: h })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var run = data.workflow_runs && data.workflow_runs[0];
      if (!run || (run.status !== 'in_progress' && run.status !== 'queued')) { callback(false); return; }
      var age = (Date.now() - new Date(run.created_at).getTime()) / 1000;
      if (age >= 600) { callback(false); return; }
      if (!filePath) { callback(true); return; }
      // Vis kun advarsel om commit som trigget bygget berørte samme fil
      fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/commits/' + run.head_sha, { headers: h })
        .then(function(r) { return r.json(); })
        .then(function(commit) {
          var files = (commit.files || []).map(function(f) { return f.filename; });
          callback(files.indexOf(filePath) !== -1);
        })
        .catch(function() { callback(true); }); // fail safe: vis advarsel
    })
    .catch(function() { callback(false); });
}

// Hent og cache innlogget GitHub-brukernavn (brukes til last_editor i frontmatter)
function fetchCurrentUser(callback) {
  var cached = localStorage.getItem('samt-bu-gh-user');
  if (cached) { callback(cached); return; }
  var token = getStoredToken();
  if (!token) { callback(null); return; }
  fetch('https://api.github.com/user', {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' }
  })
    .then(function(r) { return r.json(); })
    .then(function(u) {
      var login = u.login || null;
      var name  = u.name  || null;
      if (login) { try { localStorage.setItem('samt-bu-gh-user', login); } catch(e) {} }
      if (name)  { try { localStorage.setItem('samt-bu-gh-name',  name);  } catch(e) {} }
      callback(login);
    })
    .catch(function() { callback(null); });
}

// Persistent bygg-sporing på tvers av sidenavigering (localStorage)
var SAMTU_PENDING_KEY = 'samtu-build-pending';
function samtuGetPending() {
  try { return JSON.parse(localStorage.getItem(SAMTU_PENDING_KEY)); } catch(e) { return null; }
}
function samtuIncrementPending() {
  var p = samtuGetPending() || { count: 0 };
  var now = Date.now();
  var actor = localStorage.getItem('samt-bu-gh-user') || '';
  var newCount = (p.count || 0) + 1;
  try { localStorage.setItem(SAMTU_PENDING_KEY, JSON.stringify({ count: newCount, firstSaveAt: p.firstSaveAt || now, lastSaveAt: now, seenCompleted: p.seenCompleted || 0, actor: p.actor || actor, buildTime: p.buildTime || (window._samtuBuildTime ? String(window._samtuBuildTime) : '') })); } catch(e) {}
  samtuShowPendingIndicator(newCount);
}
function samtuDecrementPending() {
  var p = samtuGetPending();
  if (!p) return;
  var newCount = (p.count || 1) - 1;
  if (newCount <= 0) {
    samtuClearPending();
  } else {
    try { localStorage.setItem(SAMTU_PENDING_KEY, JSON.stringify({ count: newCount, firstSaveAt: p.firstSaveAt, lastSaveAt: p.lastSaveAt, seenCompleted: (p.seenCompleted || 0) + 1 })); } catch(e) {}
    samtuShowPendingIndicator(newCount);
  }
}
function samtuClearPending() {
  try { localStorage.removeItem(SAMTU_PENDING_KEY); } catch(e) {}
}
// Lokal byggehistorikk (varighet per bygg, knyttes til GH Actions-run via created_at)
var SAMTU_BUILD_HISTORY_KEY = 'samtu-build-history';
function samtuStoreBuildTime(firstSaveAt, totalMs) {
  if (!firstSaveAt || !totalMs || totalMs < 1000) return;
  try {
    var history = JSON.parse(localStorage.getItem(SAMTU_BUILD_HISTORY_KEY) || '[]');
    for (var i = 0; i < history.length; i++) {
      if (Math.abs(history[i].at - firstSaveAt) < 10000) return; // allerede lagret
    }
    history.unshift({ at: firstSaveAt, totalMs: totalMs });
    if (history.length > 30) history.pop();
    localStorage.setItem(SAMTU_BUILD_HISTORY_KEY, JSON.stringify(history));
  } catch(e) {}
}
function samtuLookupBuildTime(runCreatedAt) {
  try {
    var history = JSON.parse(localStorage.getItem(SAMTU_BUILD_HISTORY_KEY) || '[]');
    var runAt = new Date(runCreatedAt).getTime();
    for (var i = 0; i < history.length; i++) {
      if (Math.abs(history[i].at - runAt) < 30000) return history[i].totalMs;
    }
  } catch(e) {}
  return null;
}
function samtuShowPendingIndicator(count) {
  samtuShowPendingIndicatorWithTotal(count, null);
}
function samtuShowPendingIndicatorWithTotal(count, totalActive) {
  var ind = document.getElementById('qe-job-indicator');
  if (!ind) return;
  var isEn = document.documentElement.lang === 'en';
  var label = count === 1
    ? (isEn ? '1 change building\u2026' : '1 endring bygges\u2026')
    : (isEn ? count + ' changes building\u2026' : count + ' endringer bygges\u2026');
  var totalSuffix = (totalActive !== null && totalActive > count)
    ? ' <span style="opacity:.6;">(' + (isEn ? totalActive + ' total' : totalActive + ' totalt') + ')</span>'
    : '';
  ind.innerHTML = '<i class="fa fa-spinner fa-spin" style="font-size:12px; opacity:.85;"></i><span style="margin-left:7px;">' + label + totalSuffix + '</span>';
  ind.dataset.building = '1';
  ind.style.display = 'flex';
}
function samtuShowDoneIndicator() {
  var ind = document.getElementById('qe-job-indicator');
  if (!ind) return;
  var isEn = document.documentElement.lang === 'en';
  var url = window.location.href.split('?')[0] + '?_=' + Date.now();
  var label = isEn ? 'Changes published \u2013 click to reload' : 'Endringer publisert \u2013 klikk for \u00e5 laste inn';
  ind.innerHTML = '<a href="' + url + '" style="color:#9de; display:flex; align-items:center; gap:7px; text-decoration:none;"><i class="fa fa-check-circle" style="font-size:12px;"></i><span>' + label + '</span></a>';
  ind.removeAttribute('data-building');
  ind.style.display = 'flex';
}

// Lydsignal ved ferdig bygg – beep (Web Audio) + tale (Web Speech)
// Chrome blokkerer AudioContext og speechSynthesis fra setInterval uten brukergestus.
// Løsning: lås opp begge på Lagre-klikk (gestus), gjenbruk konteksten ved ferdig bygg.
var _samtuAudioCtx = null;

function samtuUnlockAudio() {
  // Opprett/gjenoppta AudioContext under brukergestus
  try {
    if (!_samtuAudioCtx) _samtuAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_samtuAudioCtx.state === 'suspended') _samtuAudioCtx.resume();
  } catch(e) {}
  // Lås opp speechSynthesis med stille ytring under brukergestus
  try {
    var u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

// Spill av noter via Web Audio API.
// notes: [[hz, startOffset, duration], ...]
// Returnerer total varighet i ms (brukes til å forsinke talen).
function _samtuPlayNotes(notes) {
  var end = 0;
  notes.forEach(function(n) { end = Math.max(end, n[1] + n[2]); });
  if (!_samtuAudioCtx) {
    try { _samtuAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (!_samtuAudioCtx) return Math.ceil(end * 1000);
  _samtuAudioCtx.resume().then(function() {
    var t = _samtuAudioCtx.currentTime;
    notes.forEach(function(n) {
      var hz = n[0], s = n[1], d = n[2];
      var osc = _samtuAudioCtx.createOscillator();
      var g = _samtuAudioCtx.createGain();
      osc.connect(g); g.connect(_samtuAudioCtx.destination);
      osc.frequency.value = hz;
      // ADSR: rask attack (20ms), sustain, kort release (80ms eller 30% av notelengde)
      var rel = Math.min(0.08, d * 0.3);
      g.gain.setValueAtTime(0.001, t + s);
      g.gain.linearRampToValueAtTime(0.32, t + s + 0.02);
      g.gain.setValueAtTime(0.32, t + s + d - rel);
      g.gain.exponentialRampToValueAtTime(0.001, t + s + d);
      osc.start(t + s);
      osc.stop(t + s + d + 0.01);
    });
  });
  return Math.ceil(end * 1000);
}

// Spill tale etter en forsinkelse (slik at lydsignal alltid kommer først)
function _samtuSpeak(text, delayMs) {
  try {
    setTimeout(function() {
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      window.speechSynthesis.speak(u);
    }, delayMs);
  } catch(e) {}
}

// Opptakt – to stigende pip (kalles når byggjobb starter)
function samtuPlayStart() {
  // 600 Hz (120ms) → 900 Hz (200ms) → tale
  var ms = _samtuPlayNotes([[600,0,0.12],[900,0.15,0.20]]);
  _samtuSpeak('Build job started', ms + 150);
}

// Seiersfanfare – C-E-G-C stigende (kalles når bygg er ferdig)
function samtuPlaySuccess() {
  // C5–E5–G5–C6, siste tone lang for avslutningseffekt
  var ms = _samtuPlayNotes([[523,0,0.22],[659,0.25,0.22],[784,0.50,0.22],[1047,0.75,0.60]]);
  _samtuSpeak('Build job complete', ms + 150);
}

// Wah-wah – tre fallende toner (kalles ved feil eller timeout)
function samtuPlayFailure() {
  // 400 → 300 → 220 Hz, siste tone lang
  var ms = _samtuPlayNotes([[400,0,0.25],[300,0.28,0.25],[220,0.56,0.55]]);
  _samtuSpeak('Build job failed', ms + 150);
}

// Poll GitHub Actions workflow – brukes for rediger og slett (2s intervall)
function startGhPoll(startTime, onDone, onError, onStatus) {
  samtuPlayStart();
  var token = getStoredToken();
  var h = { 'Accept': 'application/vnd.github+json' };
  if (token) h['Authorization'] = 'token ' + token;
  return setInterval(function() {
    fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/actions/workflows/hugo.yml/runs?per_page=5', { headers: h })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.workflow_runs) return;
        var run = null;
        for (var i = 0; i < data.workflow_runs.length; i++) {
          if (new Date(data.workflow_runs[i].created_at).getTime() >= startTime - 30000) {
            run = data.workflow_runs[i]; break;
          }
        }
        if (!run) { onStatus('Venter på bygg…'); return; }
        if (run.status === 'queued' || run.status === 'in_progress') {
          onStatus('Bygger…');
        } else if (run.status === 'completed') {
          if (run.conclusion === 'success') { samtuPlaySuccess(); onDone(); }
          else if (run.conclusion === 'cancelled') { onStatus('Avløst – venter på nytt bygg…'); }
          else { samtuPlayFailure(); onError(run.conclusion); }
        }
      })
      .catch(function() { onStatus('Sjekker…'); });
  }, 2000);
}

// Poll URL direkte – brukes for ny side (same-origin, ingen token)
function startUrlPoll(url, onDone, onError, onStatus) {
  samtuPlayStart();
  var attempts = 0;
  return setInterval(function() {
    if (++attempts > 90) { samtuPlayFailure(); onError('timeout'); return; }
    fetch(url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cf=' + Date.now(),
          { method: 'HEAD', cache: 'no-store' })
      .then(function(r) {
        if (r.ok) { samtuPlaySuccess(); onDone(); }
        else onStatus(attempts);
      })
      .catch(function() { onStatus('Venter…'); });
  }, 1000);
}

// Poll CF Pages check-run per commit-SHA (GitHub Checks API)
// Returnerer timer-ID. Kaller onSuccess() eller onFailure(reason) når ferdig.
function waitForCfCheckRun(sha, token, onSuccess, onFailure) {
  var h = { 'Accept': 'application/vnd.github+json' };
  if (token) h['Authorization'] = 'token ' + token;
  var attempts = 0;
  var timer = setInterval(function() {
    if (++attempts > 80) { clearInterval(timer); onFailure('timeout'); return; }
    fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/commits/' + sha + '/check-runs',
          { headers: h, cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var cfRun = (data.check_runs || []).find(function(r) {
          return r.name === 'Cloudflare Pages' && r.status === 'completed';
        });
        if (!cfRun) return;
        clearInterval(timer);
        if (cfRun.conclusion === 'success') onSuccess();
        else onFailure(cfRun.conclusion);
      })
      .catch(function() {});
  }, 5000);
  return timer;
}

// TipTap lazy-laster (delt av np-dialog og qe-dialog)
function loadTiptap(callback) {
  if (window._Tiptap) { callback(); return; }
  if (window._tiptapLoading) {
    window.addEventListener('tiptap-ready', function h() { window.removeEventListener('tiptap-ready', h); callback(); });
    return;
  }
  window._tiptapLoading = true;
  // Selvhostet bundle – unngår esm.sh CDN-instabilitet (se endringslogg 2026-03-14)
  import('/js/tiptap-bundle.js').then(function(mod) {
    window._Tiptap = {
      Editor:      mod.Editor,
      StarterKit:  mod.StarterKit,
      Table:       mod.Table,
      TableRow:    mod.TableRow,
      TableCell:   mod.TableCell,
      TableHeader: mod.TableHeader,
      Link:        mod.Link,
      Image:       mod.Image,
      Markdown:    mod.Markdown
    };
    window.dispatchEvent(new Event('tiptap-ready'));
    callback();
  }).catch(function(err) {
    console.error('TipTap load failed', err);
    alert('Kunne ikke laste editoren. Prøv å oppdatere siden.');
  });
}

// Pre-hent GitHub-brukernavn hvis innlogget (popuperer cache for bruk ved lagring)
if (getStoredToken() && !localStorage.getItem('samt-bu-gh-user')) fetchCurrentUser(function() {});

// Gjenopprett pending-spinner ved sideinnlasting og tell ned per ferdig bygg
setTimeout(function() {
  var p = samtuGetPending();
  if (!p || !p.count || !p.firstSaveAt) return;
  if ((Date.now() - p.firstSaveAt) > 600000) { samtuClearPending(); return; } // > 10 min – anta ferdig
  samtuShowPendingIndicator(p.count);
  var token = getStoredToken();
  var h = { 'Accept': 'application/vnd.github+json' };
  if (token) h['Authorization'] = 'token ' + token;
  function checkCompletions() {
    var p2 = samtuGetPending();
    if (!p2 || !p2.count) { clearInterval(resumeTimer); return; }
    fetch('https://api.github.com/repos/SAMT-X/samt-bu-docs/actions/workflows/hugo.yml/runs?per_page=20', { headers: h, cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.workflow_runs) return;
        var myCompleted = 0, myCancelled = 0, totalActive = 0, lastSuccessRun = null;
        for (var i = 0; i < data.workflow_runs.length; i++) {
          var run = data.workflow_runs[i];
          if (new Date(run.created_at).getTime() < p2.firstSaveAt - 30000) break;
          var isMine = !p2.actor || (run.triggering_actor && run.triggering_actor.login === p2.actor);
          if (run.status === 'completed') {
            if (isMine) {
              if (run.conclusion === 'success') { myCompleted++; if (!lastSuccessRun) lastSuccessRun = run; }
              else if (run.conclusion === 'cancelled') myCancelled++;
            }
          } else if (run.status === 'queued' || run.status === 'in_progress') {
            totalActive++;
          }
        }
        // Oppdater indikator med totalteller for alle aktive bygg
        samtuShowPendingIndicatorWithTotal(p2.count, totalActive);
        // Minst én suksess og ingen aktive → GH Actions ferdig, vent på at CF Pages publiserer
        if (myCompleted > 0 && totalActive === 0) {
          clearInterval(resumeTimer);
          var cfDoneUrl = window.location.href.split('?')[0];
          var cfDoneLang = document.documentElement.lang === 'en';

          function fireCfDone() {
            if (window._samtuDoneFired) return;
            window._samtuDoneFired = true;
            samtuStoreBuildTime(p2.firstSaveAt, Date.now() - p2.firstSaveAt);
            samtuClearPending();
            samtuShowDoneIndicator();
            samtuPlaySuccess();
            setTimeout(function() { window.location.href = cfDoneUrl + '?_=' + Date.now(); }, 1800);
          }

          // Har det gått > 90 sek siden lagring er CF Pages garantert ferdig –
          // siden viser allerede nytt innhold, poll ville aldri oppdage endring.
          if (Date.now() - p2.firstSaveAt > 90000) {
            fireCfDone();
            return;
          }

          // SHA-basert CF Pages check-run poll for push-events (nøyaktig deteksjon)
          // Fallback til _samtuBuildTime-poll for repository_dispatch og andre event-typer
          if (lastSuccessRun && lastSuccessRun.event === 'push' && lastSuccessRun.head_sha) {
            waitForCfCheckRun(lastSuccessRun.head_sha, token, fireCfDone, fireCfDone);
          } else {
            var cfAttempts = 0;
            var cfSavedBuildTime = '';
            fetch(cfDoneUrl, { cache: 'no-store' })
              .then(function(r) { return r.text(); })
              .then(function(html) { var m = html.match(/window\._samtuBuildTime=(\d+)/); if (m) cfSavedBuildTime = m[1]; })
              .catch(function() {});
            var cfTimer = setInterval(function() {
              if (++cfAttempts > 60) { clearInterval(cfTimer); fireCfDone(); return; }
              fetch(cfDoneUrl + '?_cf=' + Date.now(), { cache: 'no-store' })
                .then(function(r) { return r.text(); })
                .then(function(html) {
                  var m = html.match(/window\._samtuBuildTime=(\d+)/);
                  if (m && cfSavedBuildTime && m[1] !== cfSavedBuildTime) {
                    clearInterval(cfTimer);
                    fireCfDone();
                  }
                })
                .catch(function() {});
            }, 3000);
          }
        }
      })
      .catch(function() {});
  }
  checkCompletions();
  var resumeTimer = setInterval(checkCompletions, 3000);
}, 200);
</script>
